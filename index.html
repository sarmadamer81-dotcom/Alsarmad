<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="siteTitle">مجوهرات السرمد</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C; --bg: #0A1628; --card: #162236; --text: #F5EDD6; --white: #FFFFFF;
}
[data-theme="light"] {
  --gold: #9A7A2E; --bg: #F9F7F2; --card: #FFFFFF; --text: #1A2F45; --white: #0D1B2A;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); transition: background 0.4s; min-height: 100vh; padding-bottom: 90px; }

header { position: sticky; top: 0; z-index: 1000; background: var(--bg); border-bottom: 1px solid var(--gold); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
.brand { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
.brand-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; background: #fff; }
.brand-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--gold); }

/* NEWS TICKER */
.news-ticker { background: var(--gold); color: #000; padding: 6px; font-size: 0.8rem; font-weight: bold; overflow: hidden; white-space: nowrap; }
.ticker-wrap { display: inline-block; animation: marquee 25s linear infinite; }
@keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

/* MARKET STATS */
.market-box { background: var(--card); margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid rgba(201,168,76,0.2); display: flex; justify-content: space-around; text-align: center; }
.stat-item span { display: block; font-size: 0.7rem; color: gray; }
.stat-item b { color: var(--gold); font-size: 1rem; }

/* CATEGORY FILTERS */
.filters { display: flex; gap: 8px; overflow-x: auto; padding: 5px 15px 15px; scrollbar-width: none; }
.f-btn { background: var(--card); border: 1px solid rgba(201,168,76,0.2); color: var(--text); padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
.f-btn.active { background: var(--gold); color: #000; font-weight: bold; }

/* PRODUCT GRID */
.page { display: none; }
.page.active { display: block; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
.card { background: var(--card); border-radius: 18px; border: 1px solid rgba(201,168,76,0.1); overflow: hidden; }
.card-img { aspect-ratio: 1; background: #000; position: relative; }
.card-img img { width: 100%; height: 100%; object-fit: cover; }
.badge { position: absolute; top: 8px; right: 8px; background: var(--gold); color: #000; padding: 2px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; }
.card-info { padding: 12px; }
.price { color: var(--gold); font-weight: bold; font-size: 1rem; margin-top: 5px; }

/* HIDDEN ADMIN */
#admin { display: none; position: fixed; inset: 0; z-index: 9999; background: var(--bg); padding: 20px; overflow-y: auto; }
.admin-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 15px; }
.inp { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.2); color: var(--text); }
.btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
.list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 0.8rem; }

/* NAV */
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--gold); display: flex; z-index: 900; }
.nav-item { flex: 1; padding: 15px; text-align: center; color: #777; cursor: pointer; font-size: 0.8rem; }
.nav-item.active { color: var(--gold); font-weight: bold; }
</style>
</head>
<body data-theme="dark">

<div class="news-ticker">
  <div class="ticker-wrap" id="newsBar">مرحباً بكم في مجوهرات السرمد.. نعتز بخدمتكم.</div>
</div>

<header>
  <div class="brand" onmousedown="startAdminTimer()" onmouseup="clearAdminTimer()" ontouchstart="startAdminTimer()" ontouchend="clearAdminTimer()">
    <img id="logoImg" class="brand-logo" src="https://via.placeholder.com/100?text=Sarmad">
    <div class="brand-name" id="uiBrandName">مجوهرات السرمد</div>
  </div>
  <div style="font-size: 0.7rem; color: var(--gold);">Global Oz: <span id="ozPrice">$0</span></div>
</header>

<div class="market-box">
  <div class="stat-item"><span>غرام 21</span><b id="g21Price">0</b></div>
  <div class="stat-item"><span>غرام 9</span><b id="g9Price">0</b></div>
  <div class="stat-item"><span>صرف $</span><b id="usdRate">0</b></div>
</div>

<div id="filterContainer" class="filters"></div>

<div id="page-store" class="page active">
  <div class="grid" id="storeGrid"></div>
</div>

<div id="admin">
  <button class="btn" onclick="closeAdmin()" style="background:#ff4444; color:white; margin-bottom:15px;">✕ إغلاق لوحة التحكم</button>
  
  <div class="admin-card">
    <h3>⚙️ الهوية والأخبار</h3>
    <input type="text" id="setBrandName" class="inp" placeholder="اسم المحل">
    <input type="text" id="setLogoUrl" class="inp" placeholder="رابط اللوغو">
    <input type="text" id="setNews" class="inp" placeholder="شريط الأخبار (مثلاً: خصومات حصرية لزبائننا)">
    <input type="number" id="setUsd" class="inp" placeholder="سعر صرف الدولار (مثلاً 1500)">
    <select class="inp" id="setTheme" onchange="applyTheme(this.value)">
      <option value="dark">وضع ليلي</option>
      <option value="light">وضع نهاري</option>
    </select>
    <button class="btn" onclick="saveSettings()">حفظ الإعدادات</button>
  </div>

  <div class="admin-card">
    <h3>📂 إدارة الأصناف (الفئات)</h3>
    <input type="text" id="newCat" class="inp" placeholder="اسم الفئة الجديدة (مثلاً: محابس)">
    <button class="btn" onclick="addCategory()">إضافة فئة +</button>
    <div id="adminCats" style="margin-top:10px;"></div>
  </div>

  <div class="admin-card">
    <h3>💍 إضافة منتج جديد</h3>
    <input type="text" id="pName" class="inp" placeholder="اسم المنتج">
    <select id="pCat" class="inp"></select>
    <select id="pKarat" class="inp"><option value="21">عيار 21</option><option value="9">عيار 9</option></select>
    <input type="number" id="pWeight" class="inp" placeholder="الوزن">
    <input type="number" id="pSiyagha" class="inp" placeholder="أجور الصياغة للغرام">
    <input type="text" id="pImg" class="inp" placeholder="رابط الصورة">
    <button class="btn" onclick="addProduct()">نشر المنتج ✅</button>
  </div>

  <div id="adminProdList"></div>
</div>

<script>
// --- DATABASE ---
let db = JSON.parse(localStorage.getItem('sarmad_gold_db')) || {
  settings: { name: "مجوهرات السرمد", logo: "", news: "مجوهرات السرمد ترحب بكم.. عيار 21 و 9 بأفضل الأسعار.", usd: 1520, theme: "dark", oz: 2350 },
  categories: ["الكل", "محابس", "تراجي", "حلق"],
  products: []
};

let adminTimer;
let currentFilter = "الكل";

// --- CORE FUNCTIONS ---
function save() { localStorage.setItem('sarmad_gold_db', JSON.stringify(db)); }

async function fetchOz() {
  try {
    const res = await fetch('https://api.metals.live/v1/spot/gold');
    const data = await res.json();
    if(data[0]) { db.settings.oz = data[0].price; updatePrices(); }
  } catch(e) { updatePrices(); }
}

function updatePrices() {
  const gram21 = (db.settings.oz / 31.1035) * 0.875 * db.settings.usd;
  const gram9 = (db.settings.oz / 31.1035) * 0.375 * db.settings.usd;
  document.getElementById('ozPrice').innerText = `$${Math.round(db.settings.oz)}`;
  document.getElementById('g21Price').innerText = Math.round(gram21).toLocaleString();
  document.getElementById('g9Price').innerText = Math.round(gram9).toLocaleString();
  document.getElementById('usdRate').innerText = db.settings.usd.toLocaleString();
  renderStore();
}

// --- ADMIN ACCESS ---
function startAdminTimer() { adminTimer = setTimeout(() => { if(prompt("رمز الدخول:")==="1234") document.getElementById('admin').style.display='block'; }, 3000); }
function clearAdminTimer() { clearTimeout(adminTimer); }
function closeAdmin() { document.getElementById('admin').style.display='none'; }

// --- UI RENDERING ---
function renderUI() {
  document.body.setAttribute('data-theme', db.settings.theme);
  document.getElementById('uiBrandName').innerText = db.settings.name;
  document.getElementById('newsBar').innerText = db.settings.news;
  if(db.settings.logo) document.getElementById('logoImg').src = db.settings.logo;
  
  // Render Filters
  const fWrap = document.getElementById('filterContainer');
  fWrap.innerHTML = db.categories.map(c => `<button class="f-btn ${currentFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('');
  
  // Update Selects in Admin
  document.getElementById('pCat').innerHTML = db.categories.filter(c => c!=="الكل").map(c => `<option value="${c}">${c}</option>`).join('');
  
  // Render Admin Cat List
  document.getElementById('adminCats').innerHTML = db.categories.filter(c => c!=="الكل").map(c => `
    <div class="list-item"><span>${c}</span><button onclick="delCat('${c}')" style="color:red; background:none; border:none;">حذف</button></div>
  `).join('');
}

function setFilter(c) { currentFilter = c; renderUI(); renderStore(); }

function renderStore() {
  const grid = document.getElementById('storeGrid');
  const filtered = db.products.filter(p => currentFilter === "الكل" || p.cat === currentFilter);
  
  grid.innerHTML = filtered.map(p => {
    const purity = p.karat == "21" ? 0.875 : 0.375;
    const price = ((db.settings.oz / 31.1035) * purity * db.settings.usd + p.siyagha) * p.weight;
    return `
      <div class="card">
        <div class="card-img"><img src="${p.img}"><div class="badge">${p.karat}K</div></div>
        <div class="card-info">
          <div style="font-size:0.8rem; font-weight:bold;">${p.name}</div>
          <div style="font-size:0.6rem; color:gray;">${p.weight} غ | ${p.cat}</div>
          <div class="price">${Math.round(price).toLocaleString()} د.ع</div>
        </div>
      </div>
    `;
  }).join('');
  
  // Admin Product List
  document.getElementById('adminProdList').innerHTML = db.products.map(p => `
    <div class="list-item"><span>${p.name}</span><button onclick="delProd(${p.id})" style="color:red; background:none; border:none;">حذف</button></div>
  `).join('');
}

// --- ACTIONS ---
function saveSettings() {
  db.settings.name = document.getElementById('setBrandName').value;
  db.settings.logo = document.getElementById('setLogoUrl').value;
  db.settings.news = document.getElementById('setNews').value;
  db.settings.usd = parseFloat(document.getElementById('setUsd').value);
  save(); location.reload();
}

function applyTheme(t) { db.settings.theme = t; save(); document.body.setAttribute('data-theme', t); }

function addCategory() {
  const c = document.getElementById('newCat').value;
  if(c && !db.categories.includes(c)) { db.categories.push(c); save(); renderUI(); }
}
function delCat(c) { db.categories = db.categories.filter(x => x!==c); save(); renderUI(); }

function addProduct() {
  const p = {
    id: Date.now(),
    name: document.getElementById('pName').value,
    cat: document.getElementById('pCat').value,
    karat: document.getElementById('pKarat').value,
    weight: parseFloat(document.getElementById('pWeight').value),
    siyagha: parseFloat(document.getElementById('pSiyagha').value),
    img: document.getElementById('pImg').value
  };
  db.products.push(p); save(); renderStore();
}
function delProd(id) { db.products = db.products.filter(x => x.id!==id); save(); renderStore(); }

// --- INIT ---
document.getElementById('setBrandName').value = db.settings.name;
document.getElementById('setLogoUrl').value = db.settings.logo;
document.getElementById('setNews').value = db.settings.news;
document.getElementById('setUsd').value = db.settings.usd;

renderUI();
fetchOz();
setInterval(fetchOz, 300000);
</script>
</body>
</html>
